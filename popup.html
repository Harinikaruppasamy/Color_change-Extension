<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Color Changer</title>

    <style>
        body {
            width: 280px;
            padding: 15px;
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    


    <h2>🎨 Color Changer</h2>

    <label for="bgColor">Background Color</label>
    <input type="color" id="bgColor" value="#ffffff">

    <label for="textColor">Text Color</label>
    <input type="color" id="textColor" value="#000000">

    <label for="buttonColor">Button Color</label>
    <input type="color" id="buttonColor" value="#007bff">

    <button id="applyBtn">Apply Theme</button>

    <button id="darkBtn">Dark Mode</button>

    <button id="resetBtn">Reset</button>

    <script src="popup.js"></script>

</body>
</html>
